name: CI/CD — Industrial Digital Twin

# ── Triggers ──────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── Jobs ──────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Lint + Unit Tests (FastAPI) ──────────────────────────
  test-backend:
    name: Backend Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r capstone5_devops/requirements.txt
          pip install pytest httpx ruff

      - name: Lint with Ruff
        run: ruff check capstone5_devops/app/

      - name: Run API unit tests
        run: |
          cd capstone5_devops
          pytest tests/ -v --tb=short

  # ── Job 2: Build & Validate Images ──────────────────────────────
  build:
    name: Build & Validate Images
    needs: test-backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build FastAPI (Always validate, push only if secrets exist)
      - name: Build FastAPI Backend
        uses: docker/build-push-action@v5
        with:
          context:   .
          file:      capstone5_devops/Dockerfile
          push:      false
          tags:      industrial-energy-api:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # Build Node Server (Validation only)
      - name: Build Node Gateway
        uses: docker/build-push-action@v5
        with:
          context:   ./server
          file:      server/Dockerfile
          push:      false
          tags:      industrial-node-server:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # Build React Client (Validation only)
      - name: Build React Dashboard
        uses: docker/build-push-action@v5
        with:
          context:   ./client
          file:      client/Dockerfile
          push:      false
          tags:      industrial-dashboard:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Job 3: Deploy (DISABLED - Site not hosted) ──────────────────
  # deploy:
  #   name: Deploy via SSH
  #   needs: build
  #   runs-on: ubuntu-latest
  #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  #   steps:
  #     - name: Deploy to production server
  #       ... (Skipping as per user request: site not hosted)

  # ── Job 4: Alert on Failure ────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    needs: [test-backend, build]
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Send Slack alert
        if: env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          curl -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "❌ *CI Pipeline Failed*\nRepo: ${{ github.repository }}\nSee: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'
